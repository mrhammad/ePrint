<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ePrint — Sidebar design preview</title>
  <style>
    :root {
      --eprint-orange: #e67e22;
      --eprint-orange-dark: #c0392b;
      --eprint-blue: #2563eb;
      --sidebar-dark: #0f1729;
      --sidebar-dark-2: #1a2332;
      --sidebar-text: #e2e8f0;
      --sidebar-muted: #94a3b8;
      --context-bg: #f1f5f9;
      --content-bg: #ffffff;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: #0b0f1a;
      color: #1e293b;
      min-height: 100vh;
    }

  /* —— Preview chrome (picker bar) —— */
    .preview-bar {
      position: sticky;
      top: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 10px 20px;
      background: #1e293b;
      color: #f8fafc;
      border-bottom: 1px solid #334155;
      font-size: 13px;
    }
    .preview-bar strong { margin-right: 8px; }
    .preview-bar button {
      padding: 6px 14px;
      border: 1px solid #475569;
      border-radius: 6px;
      background: #334155;
      color: #f1f5f9;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .preview-bar button:hover { background: #475569; }
    .preview-bar button.active {
      background: var(--eprint-orange);
      border-color: var(--eprint-orange-dark);
      color: #fff;
    }
    .preview-bar .hint { color: #94a3b8; margin-left: auto; font-size: 12px; }

  /* —— App shell —— */
    .app {
      display: none;
      min-height: calc(100vh - 48px);
    }
    .app.visible { display: flex; }

    /* Global sidebar */
    .sidebar {
      width: 248px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 48px);
      transition: width 0.2s ease;
    }
    .sidebar-brand {
      padding: 20px 18px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 14px;
      color: #fff;
      flex-shrink: 0;
    }
    .brand-title { font-size: 16px; font-weight: 700; color: #fff; line-height: 1.2; }
    .brand-sub { font-size: 11px; color: var(--sidebar-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }

    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px 16px;
    }
    .nav-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--sidebar-muted);
      padding: 8px 10px 6px;
      text-transform: uppercase;
    }

    .nav-item { margin-bottom: 2px; }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--sidebar-text);
      font-size: 13px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      text-decoration: none;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .nav-link:hover { background: rgba(255, 255, 255, 0.06); }
    .nav-link .chevron {
      margin-left: auto;
      font-size: 10px;
      opacity: 0.6;
      transition: transform 0.2s;
    }
    .nav-item.open .nav-link .chevron { transform: rotate(90deg); }

    .nav-sub {
      list-style: none;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
      padding-left: 8px;
    }
    .nav-item.open .nav-sub { max-height: 320px; }
    .nav-sub a {
      display: block;
      padding: 8px 12px 8px 28px;
      font-size: 12px;
      color: var(--sidebar-muted);
      text-decoration: none;
      border-radius: 6px;
      margin: 1px 4px;
    }
    .nav-sub a:hover { color: #fff; background: rgba(255, 255, 255, 0.05); }
    .nav-sub a.active { color: #fff; font-weight: 600; }

    .sidebar-footer {
      padding: 14px 14px 18px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }
    .user-name { font-size: 13px; font-weight: 700; color: #fff; }
    .user-role { font-size: 11px; color: var(--sidebar-muted); margin-top: 2px; margin-bottom: 12px; }
    .btn-logout {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-logout:hover { background: rgba(255, 255, 255, 0.1); }

    /* Design A — pure ASAP blue active */
    #design-a .sidebar { background: var(--sidebar-dark); }
    #design-a .brand-logo { background: var(--eprint-blue); }
    #design-a .nav-link.active,
    #design-a .nav-item.open > .nav-link.parent-active {
      background: var(--eprint-blue);
      color: #fff;
    }

    /* Design B — ePrint evolution (orange accent) */
    #design-b .sidebar { background: var(--sidebar-dark-2); }
    #design-b .brand-logo {
      background: linear-gradient(135deg, var(--eprint-orange), var(--eprint-orange-dark));
    }
    #design-b .nav-link.active,
    #design-b .nav-item.open > .nav-link.parent-active {
      background: rgba(230, 126, 34, 0.18);
      color: #fff;
      border-left: 3px solid var(--eprint-orange);
      padding-left: 9px;
    }
    #design-b .nav-sub a.active {
      color: var(--eprint-orange);
      background: rgba(230, 126, 34, 0.1);
    }

    /* Design D — context strip */
    .context-strip {
      width: 200px;
      flex-shrink: 0;
      background: var(--context-bg);
      border-right: 1px solid var(--border);
      padding: 12px 0;
      display: none;
    }
    #design-d .context-strip { display: block; }
    .context-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      padding: 8px 14px;
    }
    .context-link {
      display: block;
      padding: 8px 14px;
      font-size: 12px;
      color: #334155;
      text-decoration: none;
    }
    .context-link:hover { background: #e2e8f0; }
    .context-link.active {
      background: #fff;
      color: var(--eprint-orange-dark);
      font-weight: 600;
      border-left: 3px solid var(--eprint-orange);
      padding-left: 11px;
    }

    /* Main content */
    .main-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--content-bg);
    }
    .topbar {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: #64748b;
    }
    .topbar b { color: #0f172a; }
    .content {
      flex: 1;
      padding: 20px 24px 32px;
      overflow: auto;
    }
    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 4px;
    }
    .page-sub { font-size: 13px; color: #64748b; margin-bottom: 20px; }
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .toolbar button {
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
    }
    .toolbar button.primary {
      background: linear-gradient(to bottom, var(--eprint-orange), var(--eprint-orange-dark));
      border-color: var(--eprint-orange-dark);
      color: #fff;
    }
    .grid-mock {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      box-shadow: var(--shadow);
      border-radius: 8px;
      overflow: hidden;
    }
    .grid-mock thead {
      background: linear-gradient(to bottom, var(--eprint-orange), var(--eprint-orange-dark));
      color: #fff;
    }
    .grid-mock th, .grid-mock td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .grid-mock tbody tr:hover { background: #f8fafc; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      background: #dbeafe;
      color: #1d4ed8;
    }

    /* Design E — light cards */
    #design-e .sidebar {
      background: #f8fafc;
      border-right: 1px solid var(--border);
    }
    #design-e .brand-title { color: #0f172a; }
    #design-e .brand-sub { color: #64748b; }
    #design-e .nav-label { color: #64748b; }
    #design-e .nav-link { color: #334155; }
    #design-e .nav-link:hover { background: #e2e8f0; }
    #design-e .nav-item.open > .nav-link {
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      color: #0f172a;
      font-weight: 600;
    }
    #design-e .nav-sub a { color: #64748b; }
    #design-e .nav-sub a.active { color: var(--eprint-orange-dark); }
    #design-e .sidebar-footer { border-top-color: var(--border); }
    #design-e .user-name { color: #0f172a; }
    #design-e .user-role { color: #64748b; }
    #design-e .btn-logout {
      background: #fff;
      border-color: var(--border);
      color: #334155;
    }
    #design-e .brand-logo {
      background: linear-gradient(135deg, var(--eprint-orange), var(--eprint-orange-dark));
    }

    /* Design C — compact rail */
    #design-c .sidebar { width: 56px; }
    #design-c .sidebar:hover { width: 248px; }
    #design-c .brand-title,
    #design-c .brand-sub,
    #design-c .nav-label,
    #design-c .nav-link span.label,
    #design-c .nav-link .chevron,
    #design-c .nav-sub,
    #design-c .user-name,
    #design-c .user-role,
    #design-c .btn-logout span { opacity: 0; width: 0; overflow: hidden; white-space: nowrap; }
    #design-c .sidebar:hover .brand-title,
    #design-c .sidebar:hover .brand-sub,
    #design-c .sidebar:hover .nav-label,
    #design-c .sidebar:hover .nav-link span.label,
    #design-c .sidebar:hover .nav-link .chevron,
    #design-c .sidebar:hover .nav-sub,
    #design-c .sidebar:hover .user-name,
    #design-c .sidebar:hover .user-role,
    #design-c .sidebar:hover .btn-logout span { opacity: 1; width: auto; }
    #design-c .nav-link { justify-content: center; padding: 12px; }
    #design-c .sidebar:hover .nav-link { justify-content: flex-start; padding: 10px 12px; }
    #design-c .sidebar { background: var(--sidebar-dark-2); }
    #design-c .brand-logo { background: linear-gradient(135deg, var(--eprint-orange), var(--eprint-orange-dark)); }
    #design-c .icon-only { font-size: 18px; }
  </style>
</head>
<body>

  <div class="preview-bar">
    <strong>ePrint sidebar preview</strong>
    <button type="button" class="active" data-show="design-b">B — ePrint evolution ★</button>
    <button type="button" data-show="design-a">A — ASAP dark</button>
    <button type="button" data-show="design-d">D — Two-layer (+ Items)</button>
    <button type="button" data-show="design-e">E — Light cards</button>
    <button type="button" data-show="design-c">C — Compact rail (hover)</button>
    <span class="hint">Open this file in Chrome/Edge · Click modules to expand</span>
  </div>

  <!-- Shared nav markup injected per design via clone -->
  <template id="nav-modules">
    <div class="nav-label">Modules</div>
    <div class="nav-item">
      <a class="nav-link" href="#"><span class="label">Dashboard</span></a>
    </div>
    <div class="nav-item">
      <button type="button" class="nav-link parent" aria-expanded="false">
        <span class="icon-only">👥</span><span class="label">CRM</span><span class="chevron">▶</span>
      </button>
      <ul class="nav-sub">
        <li><a href="#">View customers</a></li>
        <li><a href="#">Add customer</a></li>
        <li><a href="#">View suppliers</a></li>
        <li><a href="#">Reports</a></li>
      </ul>
    </div>
    <div class="nav-item open">
      <button type="button" class="nav-link parent parent-active" aria-expanded="true">
        <span class="icon-only">📄</span><span class="label">Estimates</span><span class="chevron">▶</span>
      </button>
      <ul class="nav-sub">
        <li><a href="#" class="active">View all</a></li>
        <li><a href="#">Add new</a></li>
        <li><a href="#">Reports</a></li>
      </ul>
    </div>
    <div class="nav-item">
      <button type="button" class="nav-link parent" aria-expanded="false">
        <span class="icon-only">📋</span><span class="label">Orders</span><span class="chevron">▶</span>
      </button>
      <ul class="nav-sub">
        <li><a href="#">View all</a></li>
        <li><a href="#">Reports</a></li>
      </ul>
    </div>
    <div class="nav-item">
      <button type="button" class="nav-link parent" aria-expanded="false">
        <span class="icon-only">🔧</span><span class="label">Jobs</span><span class="chevron">▶</span>
      </button>
      <ul class="nav-sub">
        <li><a href="#">View all</a></li>
        <li><a href="#">Add new</a></li>
      </ul>
    </div>
    <div class="nav-item">
      <button type="button" class="nav-link parent" aria-expanded="false">
        <span class="icon-only">📦</span><span class="label">Warehouse</span><span class="chevron">▶</span>
      </button>
      <ul class="nav-sub">
        <li><a href="#">Inventory</a></li>
        <li><a href="#">Add new</a></li>
      </ul>
    </div>
    <div class="nav-item">
      <button type="button" class="nav-link parent" aria-expanded="false">
        <span class="icon-only">🧾</span><span class="label">Invoice</span><span class="chevron">▶</span>
      </button>
      <ul class="nav-sub">
        <li><a href="#">View all</a></li>
      </ul>
    </div>
    <div class="nav-item">
      <button type="button" class="nav-link parent" aria-expanded="false">
        <span class="icon-only">🛒</span><span class="label">Products</span><span class="chevron">▶</span>
      </button>
      <ul class="nav-sub">
        <li><a href="#">Catalogue</a></li>
        <li><a href="#">Categories</a></li>
      </ul>
    </div>
    <div class="nav-item">
      <button type="button" class="nav-link parent" aria-expanded="false">
        <span class="icon-only">⚙</span><span class="label">Settings</span><span class="chevron">▶</span>
      </button>
      <ul class="nav-sub">
        <li><a href="#">MIS settings</a></li>
        <li><a href="#">Store settings</a></li>
      </ul>
    </div>
  </template>

  <template id="main-content">
    <div class="main-wrap">
      <div class="topbar">
        <b>Estimates</b> &nbsp;›&nbsp; View all estimates
      </div>
      <div class="content">
        <h1 class="page-title">Estimates</h1>
        <p class="page-sub">Sample list view — matches your current grid pages (estimate_view.aspx)</p>
        <div class="toolbar">
          <button type="button" class="primary">+ Add estimate</button>
          <button type="button">Export</button>
          <button type="button">Custom view</button>
        </div>
        <table class="grid-mock">
          <thead>
            <tr>
              <th>Estimate #</th>
              <th>Title</th>
              <th>Customer</th>
              <th>Date</th>
              <th>Value</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>EST-1042</td>
              <td>Business cards — Q2</td>
              <td>Acme Pty Ltd</td>
              <td>20 May 2026</td>
              <td>$1,240.00</td>
              <td><span class="badge">RFQ</span></td>
            </tr>
            <tr>
              <td>EST-1041</td>
              <td>Brochure A4 tri-fold</td>
              <td>Globo Tech</td>
              <td>18 May 2026</td>
              <td>$3,890.50</td>
              <td><span class="badge">In progress</span></td>
            </tr>
            <tr>
              <td>EST-1040</td>
              <td>Annual report 2026</td>
              <td>Test Customer</td>
              <td>15 May 2026</td>
              <td>$12,100.00</td>
              <td><span class="badge">Approved</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </template>

  <template id="context-panel">
    <aside class="context-strip">
      <div class="context-title">Items — estimate</div>
      <a class="context-link active" href="#">Item summary</a>
      <a class="context-link" href="#">Add item</a>
      <a class="context-link" href="#">Sections</a>
      <a class="context-link" href="#">Outwork</a>
      <a class="context-link" href="#">Notes</a>
      <a class="context-link" href="#">Documents</a>
      <div class="context-title" style="margin-top:16px">Options</div>
      <a class="context-link" href="#">Progress to job</a>
      <a class="context-link" href="#">Email customer</a>
    </aside>
  </template>

  <div id="design-b" class="app visible"></div>
  <div id="design-a" class="app"></div>
  <div id="design-d" class="app"></div>
  <div id="design-e" class="app"></div>
  <div id="design-c" class="app"></div>

  <script>
    function buildShell(rootId, options) {
      const root = document.getElementById(rootId);
      const sidebar = document.createElement('aside');
      sidebar.className = 'sidebar';
      sidebar.innerHTML = `
        <div class="sidebar-brand">
          <div class="brand-row">
            <div class="brand-logo">GT</div>
            <div>
              <div class="brand-title">Globo Technologies</div>
              <div class="brand-sub">Print MIS · ePrint</div>
            </div>
          </div>
        </div>
        <div class="sidebar-scroll"></div>
        <div class="sidebar-footer">
          <div class="user-name">Hammad Nasir</div>
          <div class="user-role">Super Admin</div>
          <button type="button" class="btn-logout"><span>⎋</span> <span>Logout</span></button>
        </div>`;
      const scroll = sidebar.querySelector('.sidebar-scroll');
      scroll.appendChild(document.getElementById('nav-modules').content.cloneNode(true));
      root.appendChild(sidebar);
      if (options.context) {
        root.appendChild(document.getElementById('context-panel').content.cloneNode(true));
      }
      root.appendChild(document.getElementById('main-content').content.cloneNode(true));
    }

    buildShell('design-b', {});
    buildShell('design-a', {});
    buildShell('design-d', { context: true });
    buildShell('design-e', {});
    buildShell('design-c', {});

    document.querySelectorAll('.preview-bar button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.preview-bar button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.app').forEach(a => a.classList.remove('visible'));
        document.getElementById(btn.dataset.show).classList.add('visible');
      });
    });

    document.querySelectorAll('.nav-item .parent').forEach(btn => {
      btn.addEventListener('click', () => {
        const item = btn.closest('.nav-item');
        const open = item.classList.toggle('open');
        btn.setAttribute('aria-expanded', open);
        document.querySelectorAll('.nav-item .parent').forEach(other => {
          if (other !== btn) {
            other.closest('.nav-item').classList.remove('open');
            other.classList.remove('parent-active');
            other.setAttribute('aria-expanded', 'false');
          }
        });
        if (open) btn.classList.add('parent-active');
        else btn.classList.remove('parent-active');
      });
    });

    document.querySelectorAll('.nav-sub a').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        document.querySelectorAll('.nav-sub a').forEach(x => x.classList.remove('active'));
        a.classList.add('active');
      });
    });
  </script>
</body>
</html>
