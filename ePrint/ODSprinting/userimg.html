<script>
function Upload_image6()
{
	//-------------------FILE UPLOAD FRAME--------------------------------

	var form_name		=	document.forms['upload_form'];
	if(form_name.image_filename.value=='')
	{
		alert("Please browse an image first!");
		form_name.image_filename.focus(0);
		return false;
	}
	else
	{
		var filename 	= 	form_name.image_filename.value;
		var ext 		= 	getExt(filename);
		if((ext != "jpg")&&(ext != "jpeg")&&(ext != "gif"))
		{
		alert("Please upload jpg/jpeg/gif files only.");
		return false;
		}
	}
	
	//-------------------FILE UPLOAD FRAME--------------------------------

	//form_name.action	=	"upload_image6.php";
	form_name.submit();
}


//-----------------------------------------GET EXTENSION---------------------------------

	function getExt(filename) 
	{
		var dot_pos 	= 	filename.lastIndexOf(".");
		if(dot_pos == -1)
		return "";
		return filename.substr(dot_pos+1).toLowerCase();
	}

</script>
