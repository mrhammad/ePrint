  // DEFINE VARIABLES
$imageFileName = $_REQUEST['imageFileName'];
$x1      = $_POST['x1'];
$y1           = $_POST['y1'];
$x2     = $_POST['x2'];
$y2   = $_POST['y2'];
$width           = $_POST['width'];
$height       = $_POST['height'];
  $sourceFile      = "images/". $imageFileName;
  $destinationFile = "images/dest" . $imageFileName;

  if(file_exists($destinationFile)) { 
  chmod($destinationFile, 0777);
  unlink($destinationFile); 
  }

  // CHECK TO SEE IF WE NEED TO CROP
  if($width!= 0) {
    $convertString = "convert $sourceFile -crop " . $width . "x" . $height . "+" . $x1 . "+" . $y1 . " $destinationFile";
    exec($convertString);
    chmod($destinationFile, 0777);
    chmod($sourceFile, 0777);
   // unlink($sourceFile);
  
  } else {
    // CROP WAS SKIPPED -- MOVE TO CROPPED FOLDER ANYWAY  
    $cmd = "cp " . $sourceFile . " " . $destinationFile;
    exec($cmd);
  }
