		<SCRIPT language="javascript">
	var layerRef
	var styleRef	
	var backgroundColorRef		
	
	if (navigator.appName == "Netscape")
	{
    	   layerRef="document"
           styleRef=""
           backgroundColorRef=".bgColor"
        }
        else
        {
     	   layerRef="document.all"
     	   styleRef=".style"
     	   backgroundColorRef=".backgroundColor"
        }
	locked = new Array(1);
	locked['topColorLayer'] = "no";
	layerName = "";
	colors = new Array(1);

	for (i=0; i < 1; i++)
	{
	   colors[i] = new Array(1);
	}

	i = 0;
	while (i < 1)
	{
	j = 0;
	   while (j < 3)
	   {
		colors[i][j]--;
		colors[i][j] = 0;
		j++;
	    }
	    i++;
	}

	layerName = 'topColorLayer';

 function r(hval) 		
        {
        		
         if ( locked[layerName] == "no" )
            {
            	if (layerName != "")
            	{
            		//document.all["topColorLayer"].style.backgroundColor = "#FFFFFF"
			eval(layerRef + '["' + layerName + '"]' + styleRef + backgroundColorRef + ' = "' + hval + '"')
			window.opener.colorFieldFill(hval);
            	}

                //assign values so lighten, darken and rotate will work
                //1. split hval into its RGB components
                red = hval.substring(1,3);
                green = hval.substring(3,5);
                blue = hval.substring(5,7);

                // 2. assign values to color matrix
                if (layerName == 'topColorLayer')
                {
                        colors[0][0] = red;
                        colors[0][1] = green;
                        colors[0][2] = blue;
                        topColor = hval.substring(1,7);;
             	}
             }
        }

        function l()
        {	
        	
        	lockedLayerName = 'locked' + layerName;
       	
        	if (locked[layerName] == "no")
        	{
 //       		eval(layerRef + '["colorcube"].' + layerRef + '["' + lockedLayerName + '"]' + styleRef + '.visibility = "visible"')
        		locked[layerName] = "yes";
        	}
        	else if (locked[layerName] == "yes")
        	{	
   //     		eval(layerRef + '["colorcube"].' + layerRef + '["' + lockedLayerName + '"]' + styleRef + '.visibility = "hidden"')
        		locked[layerName] = "no";
        	}
	}
