<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Variant B — Card list (Estimate Summary)</title>
  <style>
    :root {
      --accent: #e67e22;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", Tahoma, sans-serif; background: #eef2f7; color: var(--text); }
    .preview-banner { background: #1e293b; color: #f8fafc; padding: 8px 16px; font-size: 0.8rem; text-align: center; }
    .preview-banner a { color: #fdba74; }
    .shell { max-width: 1100px; margin: 0 auto; padding: 16px; }
    .hero {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
    }
    .hero-top { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 16px; align-items: flex-start; }
    .hero h1 { margin: 0; font-size: 1.5rem; }
    .hero .customer { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }
    .status-pill {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      background: #ecfdf5;
      color: #047857;
      font-size: 0.75rem;
      font-weight: 700;
      margin-top: 8px;
    }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .btn {
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #fff;
      font-weight: 600;
      font-size: 0.8125rem;
      cursor: pointer;
    }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .summary-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }
    .summary-strip div label { display: block; font-size: 0.65rem; text-transform: uppercase; color: var(--muted); font-weight: 700; }
    .summary-strip div span { font-size: 1.05rem; font-weight: 700; }
    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin: 0 0 10px 2px;
    }
    .line-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    .line-card-head {
      padding: 14px 18px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: center;
    }
    .line-num {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: #fff7ed;
      color: var(--accent);
      font-weight: 800;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.1;
    }
    .line-title { font-weight: 700; font-size: 0.95rem; }
    .line-sub { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
    .line-price { text-align: right; }
    .line-price .amt { font-size: 1.1rem; font-weight: 700; }
    .line-price .qty { font-size: 0.75rem; color: var(--muted); }
    .line-card-actions {
      display: flex;
      gap: 8px;
      padding: 0 18px 14px;
      flex-wrap: wrap;
    }
    .line-card-actions button {
      padding: 5px 10px;
      font-size: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #f8fafc;
      cursor: pointer;
    }
    .footer-total {
      background: #1e293b;
      color: #fff;
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }
    .footer-total .label { font-size: 0.8rem; opacity: 0.85; }
    .footer-total .amount { font-size: 1.35rem; font-weight: 800; }
  </style>
</head>
<body>
  <div class="preview-banner">
    Design preview only — Variant B (card list) &nbsp;|&nbsp; <a href="index.html">All variants</a>
  </div>
  <div class="shell">
    <div class="hero">
      <div class="hero-top">
        <div>
          <h1>EST-0000936</h1>
          <p class="customer">Test Company by Ham</p>
          <span class="status-pill">Open</span>
        </div>
        <div class="hero-actions">
          <button type="button" class="btn">Options</button>
          <button type="button" class="btn">Status</button>
          <button type="button" class="btn btn-primary">New estimate</button>
        </div>
      </div>
      <div class="summary-strip">
        <div><label>Line items</label><span>1</span></div>
        <div><label>Quantity</label><span>100</span></div>
        <div><label>Subtotal</label><span>$67.53</span></div>
        <div><label>Tax</label><span>$0.00</span></div>
      </div>
    </div>

    <p class="section-label">Line items</p>
    <article class="line-card">
      <div class="line-card-head">
        <div class="line-num">001</div>
        <div>
          <div class="line-title">rsfsdfsd</div>
          <div class="line-sub">Sheet Fed Digital: Single · EST-0000936-001</div>
        </div>
        <div class="line-price">
          <div class="amt">$67.53</div>
          <div class="qty">Qty 100</div>
        </div>
      </div>
      <div class="line-card-actions">
        <button type="button">View detail</button>
        <button type="button">Edit item</button>
        <button type="button">Duplicate</button>
        <button type="button">More actions</button>
      </div>
    </article>

    <div class="footer-total">
      <div>
        <div class="label">Total all items (ex. tax)</div>
        <div class="amount">$67.53</div>
      </div>
      <button type="button" class="btn" style="background:#334155;color:#fff;border-color:#334155">Progress to job</button>
    </div>
  </div>
</body>
</html>
